{% set name = "keras-hub" %}
{% set version = "0.27.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/keras-team/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: e565a3b66caee49590311b818f04d0b978355e0690f4b219c628871cf00a8694

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: True  # [py<311]

requirements:
  host:
    - python
    - pip
    - setuptools >=61.0
  run:
    - python
    - keras >=3.13
    - absl-py
    - numpy
    - packaging
    - regex
    - rich
    - kagglehub
  run_constrained:
    # https://github.com/keras-team/keras-hub/blob/v0.27.1/requirements.txt
    - tensorflow-base >=2.19
    - tensorflow-text >=2.19      # [not win]

test:
  imports:
    - keras_hub
    - keras_hub.src
  requires:
    - pip
    # Mirror keras-feedstock multi-backend test pattern; keras (a hard dep) needs at
    # least one backend installed for `import keras` (and thus `import keras_hub`) to
    # resolve. jax covers py3.14; tensorflow/pytorch fill out the lower Python versions.
    - jax
    - tensorflow  # [py<314]
    - pytorch     # [py<314]
    # eagerly imported by keras_hub.tokenizers.v2 modules
    - tokenizers
    - sentencepiece
  commands:
    - pip check

about:
  home: https://keras.io/keras_hub/
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Pretrained models for Keras.
  description: |
    KerasHub is a pretrained modeling library that provides Keras 3
    implementations of popular model architectures, paired with a collection of
    pretrained checkpoints available on Kaggle Models. Models can be used for
    both training and inference on any of the TensorFlow, Jax, and PyTorch
    backends.
  doc_url: https://keras.io/keras_hub/
  dev_url: https://github.com/keras-team/keras-hub

extra:
  recipe-maintainers:
    - xkong-anaconda
